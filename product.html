<!DOCTYPE html>
<html>
<head>
    <title>Mazo Deals - Products</title>
</head>
<body>
<h1>Products</h1>
<a href="index.html">Home</a>

<div>
    <p>Headphones - ₹2000</p>
    <button onclick="addToCart('Headphones',2000)">Add</button>
</div>

<script>
function addToCart(name, price) {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    cart.push({name, price});
    localStorage.setItem('cart', JSON.stringify(cart));
    alert('Added');
}
</script>
</body>
</html>
