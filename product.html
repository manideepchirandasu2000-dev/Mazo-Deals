<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Product — Mazo Deals</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#07080f;--surface:#0f1019;--surface2:#171824;--surface3:#1f2030;--border:#252636;--accent:#f04e23;--accent-glow:rgba(240,78,35,.22);--accent2:#f8a21f;--text:#eeeef5;--sub:#9999bb;--muted:#55556e;--success:#19d47a;--r:12px;--r-sm:8px;--r-lg:18px;--nav-h:66px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
h1,h2,h3,h4{font-family:'Syne',sans-serif}a{color:inherit;text-decoration:none}button{cursor:pointer;border:none;font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
nav{position:sticky;top:0;z-index:200;height:var(--nav-h);background:rgba(7,8,15,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 clamp(16px,4vw,64px);gap:20px;}
.nav-logo{font-family:'Syne',sans-serif;font-weight:900;font-size:22px;letter-spacing:-.5px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.nav-logo em{color:var(--accent);font-style:normal}.logo-tag{background:var(--accent);color:#fff;font-size:9px;font-weight:700;letter-spacing:.8px;padding:2px 7px;border-radius:4px;text-transform:uppercase;}
.nav-search{flex:1;max-width:500px;display:flex;align-items:center;gap:10px;background:var(--surface2);border:1.5px solid var(--border);border-radius:40px;padding:0 18px;}
.nav-search input{background:none;border:none;outline:none;color:var(--text);font-size:14px;width:100%;padding:11px 0;}
.nav-search input::placeholder{color:var(--muted)}
.nav-actions{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0;}
.nav-icon-btn{background:none;color:var(--sub);width:40px;height:40px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;transition:background .15s;position:relative;}
.nav-icon-btn:hover{background:var(--surface2);color:var(--text)}
.badge{position:absolute;top:4px;right:4px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
.nav-cta{background:var(--accent);color:#fff;padding:9px 20px;border-radius:40px;font-weight:600;font-size:14px;}
.breadcrumb{display:flex;align-items:center;gap:8px;padding:14px clamp(16px,4vw,64px);font-size:13px;color:var(--muted);}
.breadcrumb a{color:var(--muted);transition:color .15s;}.breadcrumb a:hover{color:var(--accent)}.bc-sep{color:var(--border)}
.detail-wrap{display:flex;gap:48px;padding:10px clamp(16px,4vw,64px) 60px;align-items:flex-start;}
.gallery{flex:0 0 480px;max-width:480px;}
.main-img{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:130px;margin-bottom:14px;overflow:hidden;}
.thumbs{display:flex;gap:10px;}
.thumb{width:72px;height:72px;border-radius:var(--r-sm);background:var(--surface);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;transition:border-color .15s;}
.thumb.active,.thumb:hover{border-color:var(--accent)}
.info{flex:1;min-width:0;}
.brand{font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.p-title{font-size:clamp(22px,3vw,34px);font-weight:900;letter-spacing:-.5px;line-height:1.1;margin-bottom:14px;}
.rating-row{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.stars{color:var(--accent2);font-size:14px;}.r-cnt{font-size:13px;color:var(--sub);}
.price-block{margin-bottom:20px;}
.price-now{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;}
.price-old{font-size:18px;color:var(--muted);text-decoration:line-through;margin-left:10px;}
.price-pct{font-size:14px;font-weight:700;color:var(--success);margin-left:8px;}
.stock-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(25,212,122,.1);border:1px solid rgba(25,212,122,.25);color:var(--success);font-size:12px;font-weight:600;padding:5px 13px;border-radius:40px;margin-bottom:22px;}
.dot{width:7px;height:7px;background:var(--success);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.opt-label{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.colors{display:flex;gap:10px;margin-bottom:20px;}
.c-opt{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color .15s,transform .15s;}
.c-opt.active,.c-opt:hover{border-color:var(--text);transform:scale(1.1)}
.sizes{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap;}
.s-opt{min-width:46px;padding:8px;text-align:center;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);cursor:pointer;font-size:13px;font-weight:600;transition:border-color .15s,background .15s,color .15s;}
.s-opt:hover{border-color:var(--accent);color:var(--accent)}.s-opt.active{background:var(--accent);border-color:var(--accent);color:#fff}
.qty-row{display:flex;align-items:center;gap:14px;margin-bottom:22px;}
.qty-ctrl{display:flex;align-items:center;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);overflow:hidden;}
.q-btn{width:42px;height:44px;background:none;color:var(--text);font-size:20px;transition:background .15s;}
.q-btn:hover{background:var(--surface3)}.q-val{min-width:48px;text-align:center;font-weight:700;font-size:16px;}
.actions{display:flex;gap:12px;margin-bottom:26px;}
.btn-atc{flex:1;background:var(--accent);color:#fff;padding:15px 24px;border-radius:40px;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s,transform .1s;box-shadow:0 4px 24px var(--accent-glow);}
.btn-atc:hover{opacity:.88;transform:scale(.98)}
.btn-wish{width:52px;height:52px;border-radius:50%;background:var(--surface2);border:1.5px solid var(--border);color:var(--sub);display:flex;align-items:center;justify-content:center;font-size:20px;transition:border-color .15s,color .15s;flex-shrink:0;}
.btn-wish:hover,.btn-wish.active{border-color:var(--accent);color:var(--accent)}
.meta-box{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:18px;display:flex;flex-direction:column;gap:13px;}
.meta-row{display:flex;align-items:center;gap:12px;font-size:14px;color:var(--sub);}
.meta-row span{color:var(--text);font-weight:600;}
.tabs{display:flex;border-bottom:2px solid var(--border);margin:26px 0 22px;}
.tab-btn{background:none;color:var(--muted);padding:12px 20px;font-weight:600;font-size:14px;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-pane{display:none;animation:fu .25s ease;}
.tab-pane.active{display:block}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.desc-text{font-size:15px;color:var(--sub);line-height:1.75;}
.spec-tbl{width:100%;border-collapse:collapse;}
.spec-tbl td{padding:11px 14px;font-size:14px;border-bottom:1px solid var(--border);}
.spec-tbl td:first-child{color:var(--sub);width:40%;font-weight:500;}
.review-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:12px;}
.rev-head{display:flex;justify-content:space-between;margin-bottom:8px;}
.rev-user{font-weight:700;font-size:14px;}.rev-date{font-size:12px;color:var(--muted);}
.rev-text{font-size:14px;color:var(--sub);line-height:1.6;}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;padding:0 clamp(16px,4vw,64px) 60px;}
.sec-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin:0 clamp(16px,4vw,64px) 18px;}
.product-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:border-color .2s,transform .2s;display:block;cursor:pointer;}
.product-card:hover{border-color:var(--accent);transform:translateY(-3px)}
.p-img2{width:100%;aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:46px;}
.p-body2{padding:14px;}
.p-name2{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:8px;}
.p-price2{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface3);border:1px solid var(--border);color:var(--text);padding:13px 22px;border-radius:40px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.5);transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0)}
footer{background:var(--surface);border-top:1px solid var(--border);padding:22px clamp(16px,4vw,64px);}
.f-bottom{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.f-copy{font-size:13px;color:var(--muted);}
@media(max-width:860px){.detail-wrap{flex-direction:column}.gallery{flex:none;max-width:100%;width:100%}}
</style>
</head>
<body>
<div id="toast">✅ <span id="toast-msg"></span></div>
<nav>
  <a class="nav-logo" href="index.html"><em>Mazo</em>Deals<span class="logo-tag">SALE</span></a>
  <div class="nav-search"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg><input type="text" placeholder="Search products…"/></div>
  <div class="nav-actions">
    <a class="nav-icon-btn" href="wishlist.html">♡</a>
    <a class="nav-icon-btn" href="cart.html">🛒<span class="badge" id="cart-badge">0</span></a>
    <a class="nav-cta" href="login.html">Sign In</a>
  </div>
</nav>
<div class="breadcrumb" id="breadcrumb"></div>
<div class="detail-wrap" id="detail-wrap"></div>
<h2 class="sec-title">You May Also Like</h2>
<div class="related-grid" id="related-grid"></div>
<footer><div class="f-bottom"><div class="f-copy">© 2025 Mazo Deals. All rights reserved.</div></div></footer>

<script>
const PRODUCTS=[
  {id:1,name:'Pro Wireless Earbuds X1',brand:'SoundMate',cat:'Electronics',emoji:'🎧',price:1299,old:3999,rating:4.8,reviews:2341,badge:'SALE',colors:['#1a1a2e','#e94560','#f5f5f5'],
   desc:'Crystal-clear audio with 30hr battery, active noise cancellation, and IPX5 water resistance.',
   specs:{Battery:'30 hours',Connectivity:'Bluetooth 5.3',Driver:'10mm dynamic','Noise Cancellation':'ANC','Water Resistance':'IPX5',Weight:'5g/bud'}},
  {id:2,name:'4K Ultra Smart TV 55"',brand:'VisionX',cat:'Electronics',emoji:'📺',price:28999,old:54999,rating:4.6,reviews:876,badge:'HOT',colors:['#1c1c1c'],
   desc:'Stunning 4K OLED with built-in streaming, Dolby Vision, and Atmos surround sound.',
   specs:{'Screen Size':'55"','Resolution':'4K UHD','HDR':'Dolby Vision, HDR10+','Smart OS':'Android TV 11','HDMI':'4 ports','Refresh Rate':'120Hz'}},
  {id:3,name:'Mechanical Gaming Keyboard',brand:'GearForce',cat:'Electronics',emoji:'⌨️',price:3499,old:6999,rating:4.7,reviews:1203,badge:'SALE',colors:['#000','#1a1a2e','#dc2626'],
   desc:'TKL mechanical keyboard with RGB backlighting, tactile switches, and aluminum top plate.',
   specs:{Switches:'Blue Mechanical',Backlighting:'16.8M RGB',Layout:'TKL 87-key',Connection:'USB-C','Polling Rate':'1000Hz',Material:'Aluminum top'}},
  {id:4,name:'Vintage Oversized Hoodie',brand:'UrbanThread',cat:'Fashion',emoji:'👕',price:899,old:1999,rating:4.5,reviews:543,badge:'NEW',isNew:true,colors:['#6b7280','#fbbf24','#111827','#7c3aed'],sizes:['XS','S','M','L','XL','XXL'],
   desc:'Premium cotton-blend oversized hoodie with brushed lining. Unisex fit, machine washable.',
   specs:{Material:'80% Cotton, 20% Poly',Fit:'Oversized',Care:'Machine wash 30°C',Origin:'Made in India'}},
  {id:5,name:'Minimalist Sneakers Pro',brand:'StepUp',cat:'Fashion',emoji:'👟',price:2499,old:5999,rating:4.9,reviews:3211,badge:'HOT',colors:['#fff','#000','#3b82f6'],sizes:['UK6','UK7','UK8','UK9','UK10','UK11'],
   desc:'Lightweight breathable sneakers with memory foam insole. Gym to street effortlessly.',
   specs:{Upper:'Breathable mesh',Sole:'Rubber',Insole:'Memory foam',Sizes:'UK 5-12',Weight:'260g/shoe'}},
  {id:6,name:'Smart Air Purifier 360',brand:'CleanAir',cat:'Home',emoji:'🌬️',price:7999,old:14999,rating:4.7,reviews:432,badge:'SALE',colors:['#f5f5f5','#1c1c1c'],
   desc:'HEPA 13 filter removes 99.97% of pollutants. Smart app, auto mode, 500 sq ft coverage.',
   specs:{'Filter':'HEPA 13',Coverage:'500 sq ft','Noise':'25dB sleep mode',CADR:'300 m³/h','App':'iOS & Android','Filter Life':'12 months'}},
  {id:7,name:'Coffee Maker Deluxe Pro',brand:'BrewCraft',cat:'Home',emoji:'☕',price:4299,old:8999,rating:4.6,reviews:789,badge:'SALE',colors:['#1c1c1c','#dc2626'],
   desc:'15-bar pressure, built-in frother, 5 brewing modes. Keeps coffee hot for 6 hours.',
   specs:{Pressure:'15 bar',Capacity:'1.8L',Modes:'5','Frother':'Built-in steam','Warming':'Yes',Power:'1450W'}},
  {id:8,name:'Wireless Gaming Mouse',brand:'GearForce',cat:'Electronics',emoji:'🖱️',price:1999,old:3999,rating:4.8,reviews:2104,badge:'HOT',colors:['#000','#1a1a2e'],
   desc:'69g ultralight wireless mouse, 25,600 DPI, 70hr battery, 1ms latency.',
   specs:{DPI:'100-25,600',Battery:'70 hours',Weight:'69g',Buttons:'7 programmable',Wireless:'2.4GHz','Polling Rate':'1000Hz'}},
];
function pct(p,o){return Math.round((1-p/o)*100)}
function strs(r){return'★'.repeat(Math.floor(r))+(r%1>=.5?'½':'')}
const id=+new URLSearchParams(location.search).get('id')||1;
const p=PRODUCTS.find(x=>x.id===id)||PRODUCTS[0];
document.title=p.name+' — Mazo Deals';
document.getElementById('breadcrumb').innerHTML=`<a href="index.html">Home</a><span class="bc-sep">›</span><a href="shop.html?cat=${p.cat}">${p.cat}</a><span class="bc-sep">›</span><span style="color:var(--text)">${p.name}</span>`;
let qty=1,selColor=p.colors?p.colors[0]:null,selSize=p.sizes?p.sizes[0]:null;
const colorsHTML=p.colors?`<div class="opt-label">Color</div><div class="colors">${p.colors.map((c,i)=>`<div class="c-opt ${i===0?'active':''}" style="background:${c}" onclick="selCol(this,'${c}')"></div>`).join('')}</div>`:'';
const sizesHTML=p.sizes?`<div class="opt-label" style="margin-top:4px">Size</div><div class="sizes">${p.sizes.map((s,i)=>`<div class="s-opt ${i===0?'active':''}" onclick="selSz(this,'${s}')">${s}</div>`).join('')}</div>`:'';
const specsHTML=Object.entries(p.specs||{}).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
const reviews=[
  {u:'Rahul M.',d:'12 Mar 2025',r:5,t:'Absolutely love it! Quality exceeded expectations. Super fast delivery.'},
  {u:'Priya K.',d:'5 Feb 2025',r:4,t:'Great product for the price. Build quality is solid. Would recommend.'},
  {u:'Aman S.',d:'18 Jan 2025',r:5,t:'Best purchase this year. Works exactly as described. Very happy!'},
];
document.getElementById('detail-wrap').innerHTML=`
<div class="gallery">
  <div class="main-img">${p.emoji}</div>
  <div class="thumbs">${[p.emoji,p.emoji,p.emoji,p.emoji].map((e,i)=>`<div class="thumb ${i===0?'active':''}" onclick="this.parentNode.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));this.classList.add('active')">${e}</div>`).join('')}</div>
</div>
<div class="info">
  <div class="brand">${p.brand||p.cat}</div>
  <h1 class="p-title">${p.name}</h1>
  <div class="rating-row">
    <span class="stars">${strs(p.rating)} ${p.rating}</span>
    <span class="r-cnt">(${p.reviews.toLocaleString()} reviews)</span>
    <a href="#" onclick="switchTab('reviews');return false" style="color:var(--accent);font-size:13px;font-weight:600">Read reviews</a>
  </div>
  <div class="price-block">
    <span class="price-now">₹${p.price.toLocaleString()}</span>
    <span class="price-old">₹${p.old.toLocaleString()}</span>
    <span class="price-pct">Save ${pct(p.price,p.old)}%</span>
  </div>
  <div class="stock-pill"><div class="dot"></div> In Stock — Ships in 2-3 days</div>
  ${colorsHTML}${sizesHTML}
  <div class="qty-row">
    <div class="opt-label" style="margin-bottom:0">Qty</div>
    <div class="qty-ctrl">
      <button class="q-btn" onclick="changeQty(-1)">−</button>
      <span class="q-val" id="qty-val">1</span>
      <button class="q-btn" onclick="changeQty(1)">+</button>
    </div>
  </div>
  <div class="actions">
    <button class="btn-atc" onclick="doAddCart()">🛒 Add to Cart</button>
    <button class="btn-wish" id="wish-btn" onclick="toggleWish()">♡</button>
  </div>
  <div class="meta-box">
    <div class="meta-row">🚚 <span>Free delivery</span> on orders above ₹999</div>
    <div class="meta-row">🔄 Easy <span>30-day returns</span> — no questions asked</div>
    <div class="meta-row">🔒 <span>Secure payment</span> & buyer protection</div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('desc')">Description</button>
    <button class="tab-btn" onclick="switchTab('specs')">Specifications</button>
    <button class="tab-btn" onclick="switchTab('reviews')">Reviews (${reviews.length})</button>
  </div>
  <div class="tab-pane active" id="tab-desc"><p class="desc-text">${p.desc}</p></div>
  <div class="tab-pane" id="tab-specs"><table class="spec-tbl">${specsHTML}</table></div>
  <div class="tab-pane" id="tab-reviews">${reviews.map(r=>`<div class="review-card"><div class="rev-head"><span class="rev-user">${r.u}</span><span class="rev-date">${r.d}</span></div><div style="color:var(--accent2);margin-bottom:6px">${'★'.repeat(r.r)}</div><div class="rev-text">${r.t}</div></div>`).join('')}</div>
</div>`;
function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['desc','specs','reviews'][i]===t));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
}
function selCol(el,c){document.querySelectorAll('.c-opt').forEach(o=>o.classList.remove('active'));el.classList.add('active');selColor=c;}
function selSz(el,s){document.querySelectorAll('.s-opt').forEach(o=>o.classList.remove('active'));el.classList.add('active');selSize=s;}
function changeQty(d){qty=Math.max(1,qty+d);document.getElementById('qty-val').textContent=qty;}
function toggleWish(){const b=document.getElementById('wish-btn');b.classList.toggle('active');b.textContent=b.classList.contains('active')?'♥':'♡';}
function getCart(){return JSON.parse(localStorage.getItem('mazo-cart')||'[]')}
function saveCart(c){localStorage.setItem('mazo-cart',JSON.stringify(c))}
function doAddCart(){const c=getCart();const key=`${p.id}-${selColor||''}-${selSize||''}`;const e=c.find(i=>i.key===key);if(e)e.qty+=qty;else c.push({key,id:p.id,qty,color:selColor,size:selSize});saveCart(c);updateBadge();showToast('Added to cart!');}
function updateBadge(){const n=getCart().reduce((s,i)=>s+i.qty,0);document.getElementById('cart-badge').textContent=n;}
let tt;function showToast(m){document.getElementById('toast-msg').textContent=m;const t=document.getElementById('toast');t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2600)}
updateBadge();
// Related
const related=PRODUCTS.filter(x=>x.id!==p.id&&x.cat===p.cat).slice(0,4);
if(related.length) document.getElementById('related-grid').innerHTML=related.map(r=>`<div class="product-card" onclick="window.location='product.html?id=${r.id}'"><div class="p-img2">${r.emoji}</div><div class="p-body2"><div class="p-name2">${r.name}</div><div class="p-price2">₹${r.price.toLocaleString()}</div></div></div>`).join('');
</script>
</body>
</html>
